<!DOCTYPE html>
<html lang="fr">
<head>
    <title>GPS CONVOI V44.0 - FULL MULTILINGUAL</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; height: 100vh; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; position: absolute; }

        /* MODAL ACCUEIL */
        #welcome-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 20000;
            display: flex; align-items: center; justify-content: center; padding: 15px;
        }
        .modal-content {
            background: #1e2b37; color: white; border: 3px solid #f39c12;
            border-radius: 15px; padding: 20px; max-width: 500px; text-align: left;
            max-height: 90vh; overflow-y: auto;
        }
        .guide-section { margin-bottom: 12px; padding-left: 10px; border-left: 3px solid #3498db; font-size: 14px; }
        .guide-section b { color: #f39c12; }

        /* BARRE LANGUES */
        .modal-langs { display: flex; justify-content: center; gap: 8px; margin: 20px 0; flex-wrap: wrap; border-top: 1px solid #444; padding-top: 15px; }
        #lang-bar { position: fixed; top: 80px; left: 10px; z-index: 9000; display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 12px; border: 1px solid rgba(243, 156, 18, 0.3); }
        .flag { width: 28px; height: 18px; border: 1px solid #fff; cursor: pointer; transition: transform 0.2; }
        .flag:hover { transform: scale(1.2); }

        /* UI ELEMENTS */
        #btn-travaux-direct { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 9998; background: #f39c12; color: black; border: 2px solid #000; padding: 10px 5px; border-radius: 10px; font-weight: bold; font-size: 10px; width: 75px; text-align: center; cursor: pointer; }
        .menu-btn { position: fixed; top: 15px; z-index: 9999; background: #2c3e50; color: white; border: 2px solid #f39c12; padding: 12px 10px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; }
        #btn-left { left: 5px; } #btn-right { right: 5px; }
        #nav-info { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 9999; background: rgba(0,0,0,0.9); color: #f39c12; padding: 12px 25px; border-radius: 30px; border: 2px solid #f39c12; display: flex; gap: 15px; font-weight: bold; font-size: 18px; pointer-events: none; }
        
        .sidebar { position: fixed; top: 0; height: 100vh; width: 310px; background: #1e2b37; color: white; padding: 20px; z-index: 10000; display: none; overflow-y: auto; }
        #sidebar-left { left: 0; border-right: 4px solid #f39c12; }
        #sidebar-right { right: 0; border-left: 4px solid #f39c12; }
        button { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .archive-item { display: flex; gap: 5px; margin-top: 5px; }
        .btn-load { flex-grow: 1; background: #34495e; color: white; text-align: left; }
        .btn-del { width: 40px; background: #c0392b; color: white; }
    </style>
</head>
<body>

    <div id="welcome-modal">
        <div class="modal-content">
            <h2 id="w-title" style="text-align:center; color:#f39c12; margin-top:0;">Salut ! Bienvenue</h2>
            <div class="guide-section"><b id="w-g-title">⬅️ Réseaux :</b><br><span id="w-g-desc">Catégories de convois.</span></div>
            <div class="guide-section"><b id="w-d-title">➡️ Outils :</b><br><span id="w-d-desc">Tracés et archives.</span></div>
            <div class="guide-section"><b id="w-c-title">🚧 Travaux :</b><br><span id="w-c-desc">Fenêtre ajustable.</span></div>
            <div class="guide-section"><b id="w-b-title">📍 Mesure :</b><br><span id="w-b-desc">Décompte km réel.</span></div>
            
            <p id="w-warn" style="font-size:11px; background:rgba(231, 76, 60, 0.2); padding:10px; border-radius:5px; margin-top:10px; color:#ff7675;">
                ⚠️ Sécurité : Données locales. Attention à vos partages.
            </p>

            <div class="modal-langs">
                <img src="https://flagcdn.com/w40/fr.png" class="flag" onclick="changeLang('fr')">
                <img src="https://flagcdn.com/w40/gb.png" class="flag" onclick="changeLang('en')">
                <img src="https://flagcdn.com/w40/it.png" class="flag" onclick="changeLang('it')">
                <img src="https://flagcdn.com/w40/de.png" class="flag" onclick="changeLang('de')">
                <img src="https://flagcdn.com/w40/es.png" class="flag" onclick="changeLang('es')">
                <img src="https://flagcdn.com/w40/pt.png" class="flag" onclick="changeLang('pt')">
                <img src="https://flagcdn.com/w40/pl.png" class="flag" onclick="changeLang('pl')">
                <img src="https://flagcdn.com/w40/nl.png" class="flag" onclick="changeLang('nl')">
            </div>
            <button id="w-btn" style="background:#f39c12; color:black; font-size:18px;" onclick="closeWelcome()">DÉMARRER</button>
        </div>
    </div>

    <div id="nav-info"><span id="t-dist-label">📍 RESTANT :</span> <span id="dist-val">0</span> km</div>
    <div id="btn-travaux-direct" onclick="toggleUmap()">🚧 TRAVAUX</div>
    <div id="btn-left" class="menu-btn" onclick="openMenu('sidebar-left')">☰ RÉSEAUX</div>
    <div id="btn-right" class="menu-btn" onclick="openMenu('sidebar-right')">⚙️ OUTILS</div>

    <div id="lang-bar">
        <img src="https://flagcdn.com/w40/fr.png" class="flag" onclick="changeLang('fr')">
        <img src="https://flagcdn.com/w40/gb.png" class="flag" onclick="changeLang('en')">
        <img src="https://flagcdn.com/w40/it.png" class="flag" onclick="changeLang('it')">
        <img src="https://flagcdn.com/w40/de.png" class="flag" onclick="changeLang('de')">
        <img src="https://flagcdn.com/w40/es.png" class="flag" onclick="changeLang('es')">
        <img src="https://flagcdn.com/w40/pt.png" class="flag" onclick="changeLang('pt')">
        <img src="https://flagcdn.com/w40/pl.png" class="flag" onclick="changeLang('pl')">
        <img src="https://flagcdn.com/w40/nl.png" class="flag" onclick="changeLang('nl')">
    </div>

    <div id="sidebar-left" class="sidebar">
        <button style="background:#e74c3c;" onclick="closeAll()">✖</button>
        <button style="background:#27ae60;" id="t-gps" onclick="startGPS()">🛰️ RE-CENTRER GPS</button>
        <h3 id="t-net-title">RÉSEAUX</h3>
        <label><input type="checkbox" checked onchange="toggleL('gCat1')"> Cat 1 / ATE</label><br><br>
        <label><input type="checkbox" checked onchange="toggleL('g48')"> Réseau 48t</label><br><br>
        <label><input type="checkbox" checked onchange="toggleL('g72')"> Réseau 72t</label><br><br>
        <label><input type="checkbox" checked onchange="toggleL('g94')"> Réseau 94t</label><br><br>
        <label><input type="checkbox" checked onchange="toggleL('g120')"> Réseau 120t+</label>
    </div>

    <div id="sidebar-right" class="sidebar">
        <button style="background:#e74c3c;" onclick="closeAll()">✖</button>
        <h3 id="t-route-title">ITINÉRAIRE</h3>
        <button style="background:#2ecc71; color:black;" id="t-route-btn" onclick="startRouting()">📍 TRACER</button>
        <button style="background:#c0392b;" id="t-clear-btn" onclick="clearCurrentData()">🗑️ EFFACER</button>
        <button style="background:#f39c12; color:black;" id="t-save" onclick="saveToArchive()">💾 SAUVEGARDER</button>
        <h3 id="t-arch-title">MES ARCHIVES</h3>
        <div id="archive-list"></div>
    </div>

    <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const translations = {
        fr: { wT: "Salut ! Bienvenue", wgT: "⬅️ Réseaux :", wgD: "Catégories de convois.", wdT: "➡️ Outils :", wdD: "Tracés et archives.", wcT: "🚧 Travaux :", wcD: "Fenêtre ajustable.", wbT: "📍 Mesure :", wbD: "Décompte km réel.", wWarn: "⚠️ Sécurité : Données locales. Attention à vos partages.", wBtn: "DÉMARRER", btnL: "☰ RÉSEAUX", btnR: "⚙️ OUTILS", gps: "🛰️ RE-CENTRER GPS", net: "RÉSEAUX", route: "ITINÉRAIRE", trace: "📍 TRACER", clear: "🗑️ EFFACER", save: "💾 SAUVEGARDER", arch: "MES ARCHIVES", work: "🚧 TRAVAUX", dist: "📍 RESTANT :" },
        en: { wT: "Hi! Welcome", wgT: "⬅️ Networks:", wgD: "Convoy categories.", wdT: "➡️ Tools:", wdD: "Routes & archives.", wcT: "🚧 Works:", wcD: "Adjustable window.", wbT: "📍 Measure:", wbD: "Real-time km count.", wWarn: "⚠️ Security: Local data. Be careful with sharing.", wBtn: "START", btnL: "☰ NETWORKS", btnR: "⚙️ TOOLS", gps: "🛰️ RE-CENTER GPS", net: "NETWORKS", route: "ROUTING", trace: "📍 DRAW", clear: "🗑️ CLEAR", save: "💾 SAVE", arch: "MY ARCHIVES", work: "🚧 WORKS", dist: "📍 REMAINING:" },
        it: { wT: "Ciao! Benvenuto", wgT: "⬅️ Reti:", wgD: "Categorie convogli.", wdT: "➡️ Strumenti:", wdD: "Percorsi e archivi.", wcT: "🚧 Lavori:", wcD: "Finestra regolabile.", wbT: "📍 Misura:", wbD: "Conteggio km reale.", wWarn: "⚠️ Sicurezza: Dati locali. Attenzione alla condivisione.", wBtn: "INIZIA", btnL: "☰ RETI", btnR: "⚙️ STRUMENTI", gps: "🛰️ RIPOSIZIONA GPS", net: "RETI", route: "ITINERARIO", trace: "📍 TRACCIA", clear: "🗑️ CANCELLA", save: "💾 SALVA", arch: "I MIEI ARCHIVI", work: "🚧 LAVORI", dist: "📍 RIMANENTE:" },
        de: { wT: "Hallo! Willkommen", wgT: "⬅️ Netze:", wgD: "Konvoi-Kategorien.", wdT: "➡️ Werkzeuge:", wdD: "Routen & Archive.", wcT: "🚧 Arbeiten:", wcD: "Anpassbares Fenster.", wbT: "📍 Messung:", wbD: "Echtzeit-km-Zähler.", wWarn: "⚠️ Sicherheit: Lokale Daten. Vorsicht beim Teilen.", wBtn: "STARTEN", btnL: "☰ NETZE", btnR: "⚙️ TOOLS", gps: "🛰️ GPS NEUZENTRIEREN", net: "NETZE", route: "ROUTE", trace: "📍 ZEICHNEN", clear: "🗑️ LÖSCHEN", save: "💾 SPEICHERN", arch: "MEINE ARCHIVE", work: "🚧 BAUSTELLEN", dist: "📍 VERBLEIBEND:" },
        es: { wT: "¡Hola! Bienvenido", wgT: "⬅️ Redes:", wgD: "Categorías de convoyes.", wdT: "➡️ Herramientas:", wdD: "Rutas y archivos.", wcT: "🚧 Obras:", wcD: "Ventana ajustable.", wbT: "📍 Medida:", wbD: "Cuenta atrás km.", wWarn: "⚠️ Seguridad: Datos locales. Cuidado al compartir.", wBtn: "EMPEZAR", btnL: "☰ REDES", btnR: "⚙️ TOOLS", gps: "🛰️ RECENTRAR GPS", net: "REDES", route: "ITINERARIO", trace: "📍 TRAZAR", clear: "🗑️ BORRAR", save: "💾 GUARDAR", arch: "MIS ARCHIVOS", work: "🚧 OBRAS", dist: "📍 RESTANTE:" },
        pt: { wT: "Olá! Bem-vindo", wgT: "⬅️ Redes:", wgD: "Categorias de comboios.", wdT: "➡️ Ferramentas:", wdD: "Rotas e arquivos.", wcT: "🚧 Obras:", wcD: "Janela ajustável.", wbT: "📍 Medida:", wbD: "Contagem km real.", wWarn: "⚠️ Segurança: Dados locais. Cuidado ao partilhar.", wBtn: "INICIAR", btnL: "☰ REDES", btnR: "⚙️ TOOLS", gps: "🛰️ RECENTRAR GPS", net: "REDES", route: "ITINERÁRIO", trace: "📍 TRAÇAR", clear: "🗑️ LIMPAR", save: "💾 GUARDAR", arch: "MEUS ARQUIVOS", work: "🚧 OBRAS", dist: "📍 RESTANTE:" },
        pl: { wT: "Cześć! Witamy", wgT: "⬅️ Sieci:", wgD: "Kategorie konwojów.", wdT: "➡️ Narzędzia:", wdD: "Trasy i archiwa.", wcT: "🚧 Roboty:", wcD: "Regulowane okno.", wbT: "📍 Pomiar:", wbD: "Odliczanie km.", wWarn: "⚠️ Bezpieczeństwo: Dane lokalne. Uwaga na udostępnianie.", wBtn: "START", btnL: "☰ SIECI", btnR: "⚙️ TOOLS", gps: "🛰️ CENTRUJ GPS", net: "SIECI", route: "TRASA", trace: "📍 RYSUJ", clear: "🗑️ WYCZYŚĆ", save: "💾 ZAPISZ", arch: "MOJE ARCHIWA", work: "🚧 ROBOTY", dist: "📍 POZOSTAŁO:" },
        nl: { wT: "Hoi! Welkom", wgT: "⬅️ Netwerken:", wgD: "Convooi-categorieën.", wdT: "➡️ Tools:", wdD: "Routes & archieven.", wcT: "🚧 Werken:", wcD: "Aanpasbaar venster.", wbT: "📍 Meting:", wbD: "Real-time km teller.", wWarn: "⚠️ Veiligheid: Lokale data. Pas op met delen.", wBtn: "STARTEN", btnL: "☰ NETWERKEN", btnR: "⚙️ TOOLS", gps: "🛰️ GPS HER-CENTREREN", net: "NETWERKEN", route: "ROUTE", trace: "📍 TEKENEN", clear: "🗑️ WISSEN", save: "💾 OPSLAAN", arch: "MIJN ARCHIEVEN", work: "🚧 WERKEN", dist: "📍 RESTEREND:" }
    };

    function changeLang(l) {
        const d = translations[l] || translations.fr;
        document.getElementById('w-title').innerText = d.wT;
        document.getElementById('w-g-title').innerText = d.wgT; document.getElementById('w-g-desc').innerText = d.wgD;
        document.getElementById('w-d-title').innerText = d.wdT; document.getElementById('w-d-desc').innerText = d.wdD;
        document.getElementById('w-c-title').innerText = d.wcT; document.getElementById('w-c-desc').innerText = d.wcD;
        document.getElementById('w-b-title').innerText = d.wbT; document.getElementById('w-b-desc').innerText = d.wbD;
        document.getElementById('w-warn').innerText = d.wWarn; document.getElementById('w-btn').innerText = d.wBtn;
        document.getElementById('btn-left').innerText = d.btnL; document.getElementById('btn-right').innerText = d.btnR;
        document.getElementById('t-gps').innerText = d.gps; document.getElementById('t-net-title').innerText = d.net;
        document.getElementById('t-route-title').innerText = d.route; document.getElementById('t-route-btn').innerText = d.trace; 
        document.getElementById('t-clear-btn').innerText = d.clear; document.getElementById('t-save').innerText = d.save; 
        document.getElementById('t-arch-title').innerText = d.arch; document.getElementById('btn-travaux-direct').innerText = d.work; 
        document.getElementById('t-dist-label').innerText = d.dist;
    }

    function closeWelcome() { document.getElementById('welcome-modal').style.display = 'none'; }
    var map = L.map('map', { center: [46.9, -0.5], zoom: 6, zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var userMarker = null, routePoints = [], routeLayer = L.polyline([], {color: '#002a5c', weight: 8}).addTo(map);
    var gRouteMarkers = L.featureGroup().addTo(map);
    var groups = { gCat1: L.layerGroup(), g48: L.layerGroup(), g72: L.layerGroup(), g94: L.layerGroup(), g120: L.layerGroup() };

    function startGPS() { map.locate({ watch: true, enableHighAccuracy: true }); closeAll(); }
    map.on('locationfound', (e) => {
        if (!userMarker) { userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'gps-dot', iconSize:[14,14] }) }).addTo(map); map.setView(e.latlng, 15); } 
        else { userMarker.setLatLng(e.latlng); }
        updateRemainingDistance(e.latlng);
    });

    function updateRemainingDistance(pos) {
        let pts = routeLayer.getLatLngs(); if (pts.length < 2) return;
        let minDist = Infinity, idx = 0; pts.forEach((p, i) => { let d = pos.distanceTo(p); if (d < minDist) { minDist = d; idx = i; }});
        let rem = 0; for (let i = idx; i < pts.length - 1; i++) { rem += pts[i].distanceTo(pts[i+1]); }
        document.getElementById('dist-val').innerText = (rem / 1000).toFixed(1);
    }

    function toggleUmap() {
        let win = document.getElementById('umap-window');
        if(win.style.display==='none' || !win.style.display){ document.getElementById('umap-frame').src = "https://infotravauxconvoi.gogocarto.fr/map?iframe=1"; win.style.display='block'; closeAll(); } 
        else { win.style.display='none'; }
    }

    function startRouting() { closeAll(); map.on('click', (ev) => { let m = L.marker(ev.latlng, {draggable:true}).addTo(gRouteMarkers); routePoints.push(m); m.on('dragend', updateRoute); updateRoute(); }); }
    function updateRoute() { 
        if (routePoints.length < 2) return; 
        let c = routePoints.map(m => `${m.getLatLng().lng},${m.getLatLng().lat}`).join(';'); 
        fetch(`https://router.project-osrm.org/route/v1/driving/${c}?overview=full&geometries=geojson`).then(r => r.json()).then(d => { 
            if(d.routes) { routeLayer.setLatLngs(d.routes[0].geometry.coordinates.map(x => [x[1], x[0]])); document.getElementById('dist-val').innerText = (d.routes[0].distance / 1000).toFixed(1); }
        }); 
    }

    function clearCurrentData() { gRouteMarkers.clearLayers(); routeLayer.setLatLngs([]); routePoints=[]; document.getElementById('dist-val').innerText = "0"; }
    function openMenu(id) { closeAll(); document.getElementById(id).style.display = 'block'; }
    function closeAll() { document.querySelectorAll('.sidebar').forEach(s => s.style.display = 'none'); }
    function toggleL(id) { if(map.hasLayer(groups[id])) map.removeLayer(groups[id]); else map.addLayer(groups[id]); }

    fetch("https://raw.githubusercontent.com/sven85000-wq/reseau-convoi2/refs/heads/main/reseau_convois_france_2026(2).json")
    .then(r => r.json()).then(data => {
        L.geoJSON(data, { onEachFeature: (f, l) => {
            let p = JSON.stringify(f.properties).toUpperCase();
            let g = "gCat1", col = "#FFFF00";
            if(p.includes("120")) { col="#1b5e20"; g="g120"; } else if(p.includes("94")) { col="#FF0000"; g="g94"; } else if(p.includes("72")) { col="#e67e22"; g="g72"; } else if(p.includes("48")) { col="#9b59b6"; g="g48"; }
            l.setStyle({color: col, weight: 2}); groups[g].addLayer(l);
        }}).addTo(map);
        Object.keys(groups).forEach(k => map.addLayer(groups[k]));
    });

    function saveToArchive() { 
        let n = prompt("Nom :"); if(!n) return; 
        let a = JSON.parse(localStorage.getItem('c_arch') || "[]"); a.push({ name: n, pts: routePoints.map(m => m.getLatLng()) }); 
        localStorage.setItem('c_arch', JSON.stringify(a)); renderArch(); 
    }
    function renderArch() { 
        let l = document.getElementById('archive-list'); l.innerHTML = ""; 
        let a = JSON.parse(localStorage.getItem('c_arch') || "[]");
        a.forEach((x, i) => { 
            let div = document.createElement('div'); div.className = "archive-item";
            div.innerHTML = `<button class="btn-load" onclick="loadArch(${i})">📂 ${x.name}</button><button class="btn-del" onclick="deleteArch(${i})">✖</button>`;
            l.appendChild(div); 
        }); 
    }
    function deleteArch(i) { if(confirm("Supprimer ?")) { let a = JSON.parse(localStorage.getItem('c_arch') || "[]"); a.splice(i, 1); localStorage.setItem('c_arch', JSON.stringify(a)); renderArch(); }}
    function loadArch(i) { 
        let x = JSON.parse(localStorage.getItem('c_arch'))[i]; clearCurrentData(); 
        x.pts.forEach(p => { let m = L.marker(p, {draggable:true}).addTo(gRouteMarkers); routePoints.push(m); m.on('dragend', updateRoute); }); 
        updateRoute(); closeAll(); 
    }
    renderArch();
</script>
</body>
</html>
