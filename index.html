<!DOCTYPE html>
<html lang="fr">
<head>
    <title>GPS CONVOI V40.15 NAV+</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #0f172a; font-family: sans-serif; color: white; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; transition: transform 0.2s linear; }
       
        /* Interface de Navigation Haute */
        #top-bar { position: fixed; top: 10px; left: 0; width: 100%; z-index: 9999; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; pointer-events: none; }
        .ctrl-btn { pointer-events: auto; padding: 12px 10px; border-radius: 12px; border: 2px solid white; background: #1e293b; color: white; font-weight: bold; font-size: 11px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
       
        #nav-group { display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: auto; }
        #btn-nav { background: #ef4444; width: 130px; text-align: center; border-radius: 15px; border: 2px solid white; font-weight: bold; color: white; padding: 10px; }
        #dist-info { background: rgba(15, 23, 42, 0.95); padding: 5px 15px; border-radius: 20px; border: 1px solid #00d4ff; color: #00d4ff; font-weight: 900; font-size: 16px; }

        /* Menu Latéral */
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 85%; max-width: 320px; background: #1e293b; z-index: 10001; padding: 20px; display: none; overflow-y: auto; box-sizing: border-box; border-right: 5px solid #f39c12; }
        .act-btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; margin-bottom: 10px; color: white; cursor: pointer; font-size: 12px; }

        /* Flèche de direction GPS */
        .nav-arrow { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 30px solid #00d4ff; filter: drop-shadow(0 0 5px #00d4ff); }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="ctrl-btn" style="color:#f39c12;" onclick="openMenu()">☰ MENU</div>
        <div id="nav-group">
            <div id="btn-nav" onclick="toggleNav()">🔴 NAV OFF</div>
            <div id="dist-info"><span id="km-val">0.0</span> <small>KM</small></div>
        </div>
        <div class="ctrl-btn" style="color:#00d4ff;" onclick="loadUmapData()">🔄 SYNC</div>
    </div>

    <div id="side-menu" class="sidebar">
        <button class="act-btn" style="background:#ef4444;" onclick="closeMenu()">FERMER</button>
        <h3 style="color:#f39c12;">ALERTES LIVE (uMap)</h3>
        <p style="font-size:11px; color:#94a3b8;">ID Carte : 1383897 - Synchronisation directe.</p>
        <hr>
        <h3 style="color:#00d4ff;">NAVIGATION</h3>
        <button class="act-btn" style="background:#3b82f6;" onclick="startRoute()">📏 TRACER ITINÉRAIRE</button>
        <button class="act-btn" style="background:#22c55e;" onclick="exportGPX()">📤 EXPORTER GPX</button>
        <button class="act-btn" style="background:#64748b;" onclick="clearMap()">🗑️ EFFACER TRACÉ</button>
    </div>

    <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { center: [46.5, 2.5], zoom: 6, zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var umapLayer = L.layerGroup().addTo(map);
    var routeLayer = L.polyline([], {color: '#00008B', weight: 8, opacity: 0.85}).addTo(map);
    var markersLayer = L.featureGroup().addTo(map);
    var routePoints = [];
    var userMarker = L.marker([0,0], {
        icon: L.divIcon({html:'<div class="nav-arrow"></div>', className:'', iconSize:[24,30], iconAnchor:[12,15]})
    });

    function openMenu() { document.getElementById('side-menu').style.display = 'block'; }
    function closeMenu() { document.getElementById('side-menu').style.display = 'none'; }

    // --- LIEN DYNAMIQUE UMAP (Injecté d'après tes photos) ---
    const UMAP_DATA_URL = "https://umap.openstreetmap.fr/fr/datalayer/1383897/";

    function loadUmapData() {
        fetch(UMAP_DATA_URL + "?t=" + Date.now())
        .then(r => r.json())
        .then(data => {
            umapLayer.clearLayers();
            L.geoJSON(data, {
                pointToLayer: (f, latlng) => L.marker(latlng, {
                    icon: L.divIcon({html:`<div style="font-size:24px; filter:drop-shadow(0 2px 2px black);">🚧</div>`, className:''})
                }).bindPopup(`<b>${f.properties.name || "Alerte"}</b><br>${f.properties.description || ""}`)
            }).addTo(umapLayer);
        }).catch(e => console.log("Erreur de synchro uMap"));
    }

    // --- GPS & NAVIGATION ---
    var isNav = false;
    function toggleNav() {
        isNav = !isNav;
        let btn = document.getElementById('btn-nav');
        if(isNav) {
            btn.innerText = "🟢 NAV ON"; btn.style.background = "#22c55e";
            map.locate({watch: true, setView: true, enableHighAccuracy: true});
        } else {
            btn.innerText = "🔴 NAV OFF"; btn.style.background = "#ef4444";
            map.stopLocate(); map.removeLayer(userMarker);
            document.getElementById('map').style.transform = "rotate(0deg)";
        }
    }

    map.on('locationfound', e => {
        userMarker.setLatLng(e.latlng).addTo(map);
        if(e.heading !== null) {
            document.getElementById('map').style.transform = `rotate(${-e.heading}deg)`;
        }
    });

    // --- TRACÉ D'ITINÉRAIRE ---
    function startRoute() {
        closeMenu();
        map.on('click', e => {
            let m = L.marker(e.latlng, {draggable:true}).addTo(markersLayer);
            routePoints.push(m);
            m.on('dragend', updateRoute);
            updateRoute();
        });
    }

    function updateRoute() {
        if(routePoints.length < 2) return;
        let c = routePoints.map(p => `${p.getLatLng().lng},${p.getLatLng().lat}`).join(';');
        fetch(`https://router.project-osrm.org/route/v1/driving/${c}?overview=full&geometries=geojson`)
        .then(r=>r.json()).then(d=>{
            routeLayer.setLatLngs(d.routes[0].geometry.coordinates.map(pt=>[pt[1],pt[0]]));
            document.getElementById('km-val').innerText = (d.routes[0].distance / 1000).toFixed(1);
        });
    }

    function exportGPX() {
        let pts = routeLayer.getLatLngs();
        if(!pts.length) return;
        let gpx = '<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1"><trk><trkseg>';
        pts.forEach(p => gpx += `<trkpt lat="${p.lat}" lon="${p.lng}"></trkpt>`);
        gpx += '</trkseg></trk></gpx>';
        let b = new Blob([gpx], {type: 'application/gpx+xml'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'convoi.gpx'; a.click();
    }

    function clearMap() { routePoints=[]; markersLayer.clearLayers(); routeLayer.setLatLngs([]); document.getElementById('km-val').innerText = "0.0"; }

    loadUmapData();
</script>
</body>
</html>
