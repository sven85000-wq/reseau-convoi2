<!DOCTYPE html>
<html lang="fr">
<head>
    <title>GPS CONVOI V41.7 - REDIMENSION TACTILE</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; height: 100vh; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; position: absolute; }

        /* --- FENÊTRE TRAVAUX REDIMENSIONNABLE --- */
        #umap-window {
            position: fixed;
            top: 120px;
            right: 8px;
            width: 280px; 
            height: 350px; 
            min-width: 180px;
            min-height: 150px;
            z-index: 15000;
            border: 3px solid #f39c12;
            border-radius: 12px;
            background: #1e2b37;
            display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.9);
            overflow: hidden;
            /* Support souris */
            resize: both; 
        }
        
        /* Poignée tactile spécifique en bas à droite */
        #resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 35px;
            height: 35px;
            background: #f39c12;
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            cursor: nwse-resize;
            z-index: 15001;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 2px;
            color: black;
            font-size: 14px;
            touch-action: none; /* Important pour le tactile */
        }

        #umap-window.minimized { height: 35px !important; width: 180px !important; resize: none; }
        #umap-window.ghost { opacity: 0.1; pointer-events: none; }

        .umap-bar { background: #f39c12; color: #000; padding: 8px 12px; font-weight: bold; font-size: 11px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .umap-tabs { display: flex; background: #2c3e50; border-bottom: 1px solid #f39c12; }
        .umap-tabs button { flex: 1; padding: 8px; font-size: 10px; background: transparent; color: white; border: none; cursor: pointer; }
        .umap-tabs button.active { background: #f39c12; color: black; font-weight: bold; }
        #umap-frame { width: 100%; height: calc(100% - 65px); border: none; background: #fff; }

        /* BOUTON TRAVAUX EN HAUT AU MILIEU */
        #btn-travaux-direct {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9998;
            background: #f39c12;
            color: black;
            border: 2px solid #000;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .menu-btn { position: fixed; top: 15px; z-index: 9999; background: #2c3e50; color: white; border: 2px solid #f39c12; padding: 12px 18px; border-radius: 10px; font-weight: bold; font-size: 13px; cursor: pointer; }
        #btn-left { left: 10px; } #btn-right { right: 10px; }
        #lang-bar { position: fixed; top: 75px; left: 10px; z-index: 9000; display: flex; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 8px; }
        .flag { width: 30px; height: 20px; cursor: pointer; border: 1px solid #fff; }
        .sidebar { position: fixed; top: 0; height: 100vh; width: 310px; background: #1e2b37; color: white; padding: 20px; box-sizing: border-box; z-index: 10000; overflow-y: auto; display: none; }
        #sidebar-left { left: 0; border-right: 4px solid #f39c12; }
        #sidebar-right { right: 0; border-left: 4px solid #f39c12; }
        h2 { font-size: 11px; color: #f39c12; border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 15px; text-transform: uppercase; }
        button { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .row { display: flex; align-items: center; margin-bottom: 10px; font-size: 14px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; }
        .gps-dot { width: 14px; height: 14px; background: #4285F4; border: 2px solid white; border-radius: 50%; }
        .poi-inner { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 18px; background: #333; }
    </style>
</head>
<body>

    <div id="btn-travaux-direct" onclick="toggleUmap()">🚧 TRAVAUX LIVE</div>

    <div id="umap-window">
        <div class="umap-bar" onclick="minimizeUmap()">
            <span id="umap-min-txt">➖ RÉDUIRE</span>
            <span onclick="toggleUmap(); event.stopPropagation();" style="background:#c0392b; color:white; padding:2px 6px; border-radius:4px;">X</span>
        </div>
        <div class="umap-tabs">
            <button id="tab-gogo" class="active" onclick="switchFrame('gogo')">GOGO CARTO</button>
            <button id="tab-umap" onclick="switchFrame('umap')">UMAP</button>
        </div>
        <iframe id="umap-frame" src=""></iframe>
        <div id="resize-handle">◢</div>
    </div>

    <div id="btn-left" class="menu-btn" onclick="openMenu('sidebar-left')">☰ RÉSEAUX</div>
    <div id="btn-right" class="menu-btn" onclick="openMenu('sidebar-right')">⚙️ OUTILS</div>

    <div id="lang-bar">
        <img src="https://flagcdn.com/w40/fr.png" class="flag" onclick="changeLang('fr')">
        <img src="https://flagcdn.com/w40/gb.png" class="flag" onclick="changeLang('en')">
        <img src="https://flagcdn.com/w40/it.png" class="flag" onclick="changeLang('it')">
        <img src="https://flagcdn.com/w40/de.png" class="flag" onclick="changeLang('de')">
        <img src="https://flagcdn.com/w40/es.png" class="flag" onclick="changeLang('es')">
        <img src="https://flagcdn.com/w40/pt.png" class="flag" onclick="changeLang('pt')">
        <img src="https://flagcdn.com/w40/pl.png" class="flag" onclick="changeLang('pl')">
        <img src="https://flagcdn.com/w40/nl.png" class="flag" onclick="changeLang('nl')">
    </div>

    <div id="sidebar-left" class="sidebar">
        <button style="background:#e74c3c; margin-bottom: 20px;" onclick="closeAll()">✖ FERMER</button>
        <button style="background:#27ae60; padding:18px; margin-bottom: 20px;" onclick="startGPS()" id="t-gps">🛰️ RE-CENTRER GPS (LIVE)</button>
        <h2 id="t-net-title">RÉSEAUX & TRAVAUX</h2>
        <div class="row" onclick="toggleUmap()" style="background: rgba(243, 156, 18, 0.3); border: 2px solid #f39c12; margin-bottom:15px; cursor:pointer;">
            <span style="font-size: 18px; margin-right: 10px;">🚧</span> <b>FENÊTRE TRAVAUX</b>
        </div>
        <div class="row"><input type="checkbox" id="chk-gCat1" checked onchange="toggleL('gCat1')"> Cat 1 / ATE</div>
        <div class="row"><input type="checkbox" id="chk-g48" checked onchange="toggleL('g48')"> Réseau 48t</div>
        <div class="row"><input type="checkbox" id="chk-g72" checked onchange="toggleL('g72')"> Réseau 72t</div>
        <div class="row"><input type="checkbox" id="chk-g94" checked onchange="toggleL('g94')"> Réseau 94t</div>
        <div class="row"><input type="checkbox" id="chk-g120" checked onchange="toggleL('g120')"> Réseau 120t+</div>
    </div>

    <div id="sidebar-right" class="sidebar">
        <button style="background:#e74c3c; margin-bottom: 20px;" onclick="closeAll()">✖ FERMER</button>
        <h2 id="t-poi-title">AIDES & POI</h2>
        <input type="text" id="poiNote" placeholder="Note..." style="width:100%; padding:10px; margin-bottom:10px; background:#2c3e50; color:white; border:1px solid #555; border-radius:5px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button style="background:#2980b9;" onclick="activatePoi('🅿️', '#2980b9')">🅿️ PARKING</button>
            <button style="background:#7f8c8d;" onclick="activatePoi('🌉', '#7f8c8d')">🌉 PONT</button>
            <button style="background:#c0392b;" onclick="activatePoi('⚠️', '#c0392b')">⚠️ ALERTE</button>
            <button style="background:#d35400;" onclick="activatePoi('RESTO', '#d35400')">🍽️ RESTO</button>
        </div>
        <h2 id="t-route-title">ITINÉRAIRE</h2>
        <button id="t-route-btn" style="background:#2ecc71; color:black;" onclick="startRouting()">📍 TRACER (ÉPINGLES)</button>
        <button id="t-clear-btn" style="background:#c0392b;" onclick="clearCurrentData()">🗑️ EFFACER TOUT</button>
        <button id="t-save" style="background:#f39c12; color:black;" onclick="saveToArchive()">💾 SAUVEGARDER</button>
        <h2 id="t-arch-title">MES ARCHIVES</h2>
        <div id="archive-list"></div>
    </div>

    <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const trans = {
        fr: { btnL: "☰ RÉSEAUX", btnR: "⚙️ OUTILS", gps: "🛰️ RE-CENTRER GPS", net: "RÉSEAUX & TRAVAUX", poi: "AIDES & POI", route: "ITINÉRAIRE", trace: "📍 TRACER (ÉPINGLES)", clear: "🗑️ EFFACER TOUT", save: "💾 SAUVEGARDER", arch: "MES ARCHIVES", work: "🚧 TRAVAUX" },
        en: { btnL: "☰ NETWORKS", btnR: "⚙️ TOOLS", gps: "🛰️ RE-CENTER GPS", net: "NETWORKS & WORKS", poi: "MARKERS", route: "ROUTING", trace: "📍 DRAW (PINS)", clear: "🗑️ CLEAR ALL", save: "💾 SAVE", arch: "MY ARCHIVES", work: "🚧 WORKS" },
        it: { btnL: "☰ RETI", btnR: "⚙️ STRUMENTI", gps: "🛰️ RICENTRA GPS", net: "RETI & LAVORI", poi: "POI", route: "ITINERARIO", trace: "📍 TRACCIA (PIN)", clear: "CANCELLA", save: "💾 SALVA", arch: "ARCHIVI", work: "🚧 LAVORI" },
        de: { btnL: "☰ NETZE", btnR: "⚙️ TOOLS", gps: "🛰️ GPS ZENTRIEREN", net: "NETZE & ARBEITEN", poi: "MARKER", route: "ROUTE", trace: "📍 ZEICHNEN", clear: "LÖSCHEN", save: "💾 SPEICHERN", arch: "ARCHIV", work: "🚧 ARBEITEN" },
        es: { btnL: "☰ REDES", btnR: "⚙️ HERRAMIENTAS", gps: "🛰️ RE-CENTRAR GPS", net: "REDES & OBRAS", poi: "PUNTOS", route: "RUTA", trace: "📍 TRAZAR", clear: "BORRAR", save: "💾 GUARDAR", arch: "ARCHIVOS", work: "🚧 OBRAS" },
        pt: { btnL: "☰ REDES", btnR: "⚙️ FERRAMENTAS", gps: "🛰️ RE-CENTRAR GPS", net: "REDES & OBRAS", poi: "PUNTOS", route: "ROTA", trace: "📍 TRAÇAR", clear: "LIMPAR", save: "💾 SALVAR", arch: "ARQUIVOS", work: "🚧 OBRAS" },
        pl: { btnL: "☰ SIECI", btnR: "⚙️ NARZĘDZIA", gps: "🛰️ CENTRUJ GPS", net: "SIECI & ROBOTY", poi: "PUNKTY", route: "TRASA", trace: "📍 RYSUJ", clear: "USUŃ", save: "💾 ZAPISZ", arch: "ARCHIWUM", work: "🚧 ROBOTY" },
        nl: { btnL: "☰ NETWERKEN", btnR: "⚙️ OPTIES", gps: "🛰️ GPS CENTREREN", net: "WERKEN", poi: "PUNTEN", route: "ROUTE", trace: "📍 TEKENEN", clear: "WISSEN", save: "💾 OPSLAAN", arch: "ARCHIEVEN", work: "🚧 WERKEN" }
    };

    function changeLang(l) {
        const d = trans[l] || trans.fr;
        document.getElementById('btn-left').innerText = d.btnL;
        document.getElementById('btn-right').innerText = d.btnR;
        document.getElementById('t-gps').innerText = d.gps;
        document.getElementById('t-net-title').innerText = d.net;
        document.getElementById('t-poi-title').innerText = d.poi;
        document.getElementById('t-route-title').innerText = d.route;
        document.getElementById('t-route-btn').innerText = d.trace;
        document.getElementById('t-clear-btn').innerText = d.clear;
        document.getElementById('t-save').innerText = d.save;
        document.getElementById('t-arch-title').innerText = d.arch;
        document.getElementById('btn-travaux-direct').innerText = d.work;
    }

    var map = L.map('map', { center: [46.9, -0.5], zoom: 6, zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var gPois = L.featureGroup().addTo(map);
    var gRouteMarkers = L.featureGroup().addTo(map);
    var routeLayer = L.polyline([], {color: '#002a5c', weight: 8}).addTo(map);
    var routePoints = []; 
    var userMarker = null;
    var groups = { gCat1: L.layerGroup(), g48: L.layerGroup(), g72: L.layerGroup(), g94: L.layerGroup(), g120: L.layerGroup() };

    function startGPS() { map.locate({ watch: true, enableHighAccuracy: true }); closeAll(); }
    map.on('locationfound', (e) => {
        if (!userMarker) { userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'gps-dot', iconSize: [14, 14] }) }).addTo(map); map.setView(e.latlng, 15);
        } else { userMarker.setLatLng(e.latlng); }
    });

    const worksLinks = {
        gogo: "https://infotravauxconvoi.gogocarto.fr/map?iframe=1#/carte/@46.33,2.50,6z?cat=all",
        umap: "https://umap.openstreetmap.fr/fr/map/travaux-convoi-2026_1383926?localizeUser=true"
    };

    function toggleUmap() {
        const win = document.getElementById('umap-window');
        if (win.style.display === 'none' || win.style.display === '') {
            switchFrame('gogo'); win.style.display = 'block'; closeAll();
        } else { win.style.display = 'none'; }
    }

    function switchFrame(type) {
        document.getElementById('umap-frame').src = worksLinks[type];
        document.getElementById('tab-gogo').classList.toggle('active', type === 'gogo');
        document.getElementById('tab-umap').classList.toggle('active', type === 'umap');
    }

    function minimizeUmap() {
        const win = document.getElementById('umap-window');
        win.classList.toggle('minimized');
        document.getElementById('umap-min-txt').innerText = win.classList.contains('minimized') ? "➕" : "➖ RÉDUIRE";
    }

    // --- SCRIPT REDIMENSION TACTILE ---
    const win = document.getElementById('umap-window');
    const handle = document.getElementById('resize-handle');
    let isResizing = false;

    handle.addEventListener('touchstart', (e) => {
        isResizing = true;
        document.body.style.overflow = 'hidden';
    });

    window.addEventListener('touchmove', (e) => {
        if (!isResizing) return;
        let touch = e.touches[0];
        let newWidth = touch.clientX - win.offsetLeft;
        let newHeight = touch.clientY - win.offsetTop;
        if (newWidth > 150) win.style.width = newWidth + 'px';
        if (newHeight > 100) win.style.height = newHeight + 'px';
    });

    window.addEventListener('touchend', () => { isResizing = false; });

    map.on('mousedown touchstart', () => document.getElementById('umap-window').classList.add('ghost'));
    map.on('mouseup touchend', () => setTimeout(() => document.getElementById('umap-window').classList.remove('ghost'), 800));

    fetch("https://raw.githubusercontent.com/sven85000-wq/reseau-convoi2/refs/heads/main/reseau_convois_france_2026(2).json")
    .then(r => r.json()).then(data => {
        L.geoJSON(data, { onEachFeature: (f, l) => {
            let p = JSON.stringify(f.properties).toUpperCase();
            let g = "gCat1", c = "#FFFF00";
            if(p.includes("120")) { c="#1b5e20"; g="g120"; } 
            else if(p.includes("94")) { c="#FF0000"; g="g94"; } 
            else if(p.includes("72")) { c="#e67e22"; g="g72"; } 
            else if(p.includes("48")) { c="#9b59b6"; g="g48"; }
            l.setStyle({color: c, weight: 2}); groups[g].addLayer(l);
        }}).addTo(map);
        Object.keys(groups).forEach(k => map.addLayer(groups[k]));
    });

    function openMenu(id) { closeAll(); document.getElementById(id).style.display = 'block'; }
    function closeAll() { document.querySelectorAll('.sidebar').forEach(s => s.style.display = 'none'); }
    function toggleL(id) { if(map.hasLayer(groups[id])) map.removeLayer(groups[id]); else map.addLayer(groups[id]); }
    function clearCurrentData() { gRouteMarkers.clearLayers(); routeLayer.setLatLngs([]); gPois.clearLayers(); routePoints=[]; }

    function activatePoi(type, color) {
        closeAll(); map.once('click', (e) => {
            let n = document.getElementById('poiNote').value;
            L.marker(e.latlng, {icon: L.divIcon({ className:'poi', html:`<div class="poi-inner" style="background:${color}">${type}</div>`, iconSize:[34,34], iconAnchor:[17,17]})}).addTo(gPois).bindTooltip(n);
        });
    }

    function startRouting() { closeAll(); map.on('click', (e) => {
        let m = L.marker(e.latlng, {draggable:true}).addTo(gRouteMarkers);
        routePoints.push(m); m.on('dragend', updateRoute); updateRoute();
    }); }

    function updateRoute() {
        if (routePoints.length < 2) return;
        let coords = routePoints.map(m => `${m.getLatLng().lng},${m.getLatLng().lat}`).join(';');
        fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`)
        .then(r => r.json()).then(d => { if(d.routes) routeLayer.setLatLngs(d.routes[0].geometry.coordinates.map(x => [x[1], x[0]])); });
    }

    function saveToArchive() {
        let n = prompt("Nom :"); if(!n) return;
        let data = { name: n, pts: routePoints.map(m => m.getLatLng()) };
        let a = JSON.parse(localStorage.getItem('convoi_arch') || "[]");
        a.push(data); localStorage.setItem('convoi_arch', JSON.stringify(a)); renderArch();
    }

    function renderArch() {
        let l = document.getElementById('archive-list'); l.innerHTML = "";
        let a = JSON.parse(localStorage.getItem('convoi_arch') || "[]");
        a.forEach((x, i) => {
            let d = document.createElement('div'); d.innerHTML = `<button onclick="loadArch(${i})" style="background:#34495e; margin-top:5px;">📂 ${x.name}</button>`;
            l.appendChild(d);
        });
    }
    
    function loadArch(i) {
        let a = JSON.parse(localStorage.getItem('convoi_arch'))[i];
        clearCurrentData(); a.pts.forEach(p => { let m = L.marker(p, {draggable:true}).addTo(gRouteMarkers); routePoints.push(m); });
        updateRoute(); closeAll();
    }
    renderArch();
</script>
</body>
</html>
